<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="WordDeck">
<title>WordDeck</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0e0e12;color:#f0eff8;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:60px}
.hdr{width:100%;max-width:700px;padding:20px 16px 0;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:22px;font-weight:900;color:#f0c060}.logo span{color:#7b6ef6}
.badges{display:flex;gap:8px;align-items:center}
.badge{font-size:11px;color:#7a798a;background:#1c1c26;border:1px solid #2a2a38;padding:4px 11px;border-radius:50px}
.sync{display:flex;align-items:center;gap:5px;font-size:11px;color:#7a798a;background:#1c1c26;border:1px solid #2a2a38;padding:4px 11px;border-radius:50px}
.dot{width:6px;height:6px;border-radius:50%;background:#4ade80;transition:background .3s}
.dot.s{background:#f0c060}.dot.e{background:#f87171}
.stats{width:100%;max-width:700px;padding:12px 16px 0;display:flex;gap:8px}
.sp{flex:1;background:#1c1c26;border:1px solid #2a2a38;border-radius:12px;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px}
.sp .n{font-size:20px;font-weight:700}.sp .l{font-size:10px;color:#7a798a;text-transform:uppercase;letter-spacing:.4px}
.ny{color:#f0c060}.ng{color:#4ade80}.nr{color:#f87171}
.tabs{display:flex;gap:5px;margin:14px 0 0;background:#1c1c26;border:1px solid #2a2a38;padding:5px;border-radius:50px}
.tb{padding:7px 15px;border-radius:50px;border:none;background:transparent;color:#7a798a;font-size:13px;font-weight:500;cursor:pointer;font-family:-apple-system,sans-serif}
.tb.on{background:#f0c060;color:#0e0e12;font-weight:700}
.main{width:100%;max-width:700px;padding:16px 16px 0}
.sc{display:none}.sc.on{display:block}
.pb{width:100%;background:#1c1c26;border-radius:50px;height:5px;overflow:hidden;margin-bottom:14px}
.pbf{height:100%;background:linear-gradient(90deg,#7b6ef6,#f0c060);border-radius:50px;transition:width .4s;width:0%}
.fcw{display:flex;flex-direction:column;align-items:center;gap:12px}
.ctrls{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:center}
.dtog{display:flex;background:#1c1c26;border:1px solid #2a2a38;border-radius:50px;overflow:hidden}
.db{padding:6px 12px;border:none;background:transparent;color:#7a798a;font-size:12px;cursor:pointer;font-family:-apple-system,sans-serif}
.db.on{background:#7b6ef6;color:#fff;font-weight:600}
.smbtn{padding:6px 11px;border-radius:50px;border:1px solid #2a2a38;background:#1c1c26;color:#7a798a;font-size:12px;cursor:pointer;font-family:-apple-system,sans-serif}
.smbtn.ron{border-color:#f87171;color:#f87171;background:rgba(248,113,113,.1);font-weight:600}
.scene{width:100%;max-width:480px;height:270px;-webkit-perspective:1000px;perspective:1000px;cursor:pointer}
.inner{width:100%;height:100%;-webkit-transform-style:preserve-3d;transform-style:preserve-3d;-webkit-transition:-webkit-transform .45s ease;transition:transform .45s ease;position:relative}
.inner.flip{-webkit-transform:rotateY(180deg);transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-backface-visibility:hidden;backface-visibility:hidden;padding:18px 22px;gap:7px;border:1px solid #2a2a38}
.face.fr{background:#1c1c26}
.face.bk{background:#1a1a2e;border-color:#7b6ef6;-webkit-transform:rotateY(180deg);transform:rotateY(180deg)}
.face.gg{border-color:#4ade80;box-shadow:0 0 0 2px rgba(74,222,128,.1)}
.face.gr{border-color:#f87171;box-shadow:0 0 0 2px rgba(248,113,113,.1)}
.cbadge{position:absolute;top:11px;right:12px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px}
.cbadge.kg{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.cbadge.kr{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.clbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#7a798a}
.cword{font-size:34px;font-weight:700;text-align:center;line-height:1.1;font-family:Georgia,serif}
.bk .cword{color:#f0c060}
.exw{width:100%;border-top:1px solid #2a2a38;padding-top:9px;margin-top:2px;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:40px}
.exen{font-size:12px;color:#7a798a;text-align:center;font-style:italic;line-height:1.5;max-width:320px}
.exhl{color:#f0c060;font-style:normal;font-weight:600}
.extr{font-size:11px;color:#444460;text-align:center}
.chint{font-size:10px;color:#2a2a44}
.cnav{display:flex;gap:9px;align-items:center}
.nbtn{padding:9px 16px;border-radius:50px;border:1px solid #2a2a38;background:#1c1c26;color:#f0eff8;font-size:13px;cursor:pointer;font-family:-apple-system,sans-serif}
.ninfo{font-size:13px;color:#7a798a;min-width:50px;text-align:center}
.mrow{display:flex;gap:10px;align-items:center}
.mbtn{padding:10px 22px;border-radius:50px;border:2px solid;font-size:14px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif}
.mbtn.no{border-color:#f87171;color:#f87171;background:rgba(248,113,113,.07)}
.mbtn.yes{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,.07)}
.wkp{width:100%;max-width:480px;background:#1c1c26;border:1px solid rgba(248,113,113,.3);border-radius:14px;padding:12px 15px}
.wkt{font-size:13px;font-weight:700;color:#f87171}
.wks{font-size:11px;color:#7a798a;margin-top:2px}
.wtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.wtag{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#f87171;border-radius:50px;padding:2px 8px;font-size:11px}
.empty{text-align:center;padding:36px 16px;color:#7a798a;background:#1c1c26;border:1px dashed #2a2a38;border-radius:14px;font-size:13px;width:100%;max-width:480px}
.empty .ei{font-size:30px;margin-bottom:8px}
/* QUIZ */
.qw{display:flex;flex-direction:column;gap:14px}
.qbox{background:#1c1c26;border:1px solid #2a2a38;border-radius:14px;padding:22px 20px;text-align:center}
.qlbl{font-size:10px;letter-spacing:2px;color:#7a798a;text-transform:uppercase;margin-bottom:7px}
.qword{font-size:34px;font-weight:700;color:#f0c060;font-family:Georgia,serif}
.qsent{font-size:12px;color:#7a798a;font-style:italic;margin-top:8px;line-height:1.5;min-height:16px}
.qsent .exhl{color:#f0c060;font-style:normal;font-weight:600}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.qopt{background:#1c1c26;border:1px solid #2a2a38;border-radius:10px;padding:13px;font-size:14px;cursor:pointer;color:#f0eff8;font-weight:500;text-align:center;font-family:-apple-system,sans-serif;-webkit-appearance:none}
.qopt.ok{border-color:#4ade80;background:rgba(74,222,128,.1);color:#4ade80}
.qopt.no{border-color:#f87171;background:rgba(248,113,113,.1);color:#f87171}
.sbox{text-align:center;padding:36px 20px;background:#1c1c26;border:1px solid #2a2a38;border-radius:14px}
.snum{font-size:60px;font-weight:700;color:#f0c060;font-family:Georgia,serif;line-height:1}
.slbl{color:#7a798a;margin-top:6px;font-size:14px}
.semoji{font-size:40px;margin-bottom:10px}
.brow{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.pbtn{background:#f0c060;color:#0e0e12;border:none;border-radius:50px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif}
.obtn{background:transparent;border:1px solid #f87171;color:#f87171;border-radius:50px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif}
/* ADD */
.aform{background:#1c1c26;border:1px solid #2a2a38;border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:11px;margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flbl{font-size:10px;color:#7a798a;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:block}
.fi{background:#16161d;border:1px solid #2a2a38;border-radius:8px;padding:10px 12px;font-size:15px;color:#f0eff8;outline:none;width:100%;font-family:-apple-system,sans-serif;-webkit-appearance:none}
.fi:focus{border-color:#7b6ef6}
.fi.err{border-color:#f87171}
.abtn{background:#f0c060;color:#0e0e12;border:none;border-radius:50px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif;width:100%}
.lhdr{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.ltitle{font-size:18px;font-weight:700;font-family:Georgia,serif}
.srch{background:#1c1c26;border:1px solid #2a2a38;border-radius:50px;padding:6px 13px;font-size:13px;color:#f0eff8;outline:none;width:150px;font-family:-apple-system,sans-serif;-webkit-appearance:none}
.wlist{display:flex;flex-direction:column;gap:6px;max-height:450px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wi{background:#1c1c26;border:1px solid #2a2a38;border-radius:10px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
.wi.gk{border-left:3px solid #4ade80}.wi.rk{border-left:3px solid #f87171}
.wit{display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.wen{font-weight:600;font-size:13px}.wtr{color:#7a798a;font-size:13px}.wsep{color:#2a2a38}
.wb{font-size:10px;padding:2px 7px;border-radius:50px;font-weight:600}
.wb.g{background:rgba(74,222,128,.15);color:#4ade80}
.wb.r{background:rgba(248,113,113,.15);color:#f87171}
.delbtn{background:none;border:none;color:#7a798a;cursor:pointer;font-size:14px;padding:3px 6px;-webkit-appearance:none}
.toast{position:fixed;bottom:22px;left:50%;-webkit-transform:translateX(-50%) translateY(60px);transform:translateX(-50%) translateY(60px);background:#1c1c26;border-radius:50px;padding:8px 18px;font-size:13px;font-weight:500;opacity:0;-webkit-transition:all .3s;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;border:1px solid #2a2a38}
.toast.show{opacity:1;-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0)}
.toast.tg{border-color:#4ade80;color:#4ade80}
.toast.tr{border-color:#f87171;color:#f87171}
@media(max-width:400px){.qopts{grid-template-columns:1fr}.frow{grid-template-columns:1fr}.cword{font-size:26px}.qword{font-size:26px}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Word<span>Deck</span></div>
  <div class="badges">
    <div class="sync"><div class="dot" id="dot"></div><span id="synclbl">Hazır</span></div>
    <div class="badge" id="cntbadge">0 kelime</div>
  </div>
</div>
<div class="stats">
  <div class="sp"><div class="n ny" id="stot">0</div><div class="l">Toplam</div></div>
  <div class="sp"><div class="n ng" id="skn">0</div><div class="l">✓ Bildim</div></div>
  <div class="sp"><div class="n nr" id="swk">0</div><div class="l">✗ Bilmedim</div></div>
  <div class="sp">
    <svg width="38" height="38" viewBox="0 0 44 44" style="-webkit-transform:rotate(-90deg);transform:rotate(-90deg)">
      <circle fill="none" stroke="#2a2a38" stroke-width="4" cx="22" cy="22" r="18"/>
      <circle id="ring" fill="none" stroke="#4ade80" stroke-width="4" stroke-linecap="round" cx="22" cy="22" r="18" stroke-dasharray="113" stroke-dashoffset="113" style="-webkit-transition:stroke-dashoffset .6s;transition:stroke-dashoffset .6s"/>
    </svg>
    <div class="l">İlerleme</div>
  </div>
</div>
<div class="tabs">
  <button class="tb on" id="tab-fc" onclick="goTab('fc')">🃏 Flashcard</button>
  <button class="tb" id="tab-qz" onclick="goTab('qz')">🧠 Quiz</button>
  <button class="tb" id="tab-add" onclick="goTab('add')">📚 Kelimeler</button>
</div>
<div class="main">
  <div class="sc on" id="sc-fc">
    <div class="fcw">
      <div class="pb" style="width:100%;max-width:480px"><div class="pbf" id="fcpb"></div></div>
      <div class="ctrls">
        <div class="dtog">
          <button class="db on" id="dEN" onclick="setDir('EN')">🇬🇧 EN→TR</button>
          <button class="db" id="dTR" onclick="setDir('TR')">🇹🇷 TR→EN</button>
        </div>
        <button class="smbtn" onclick="doShuffle()">🔀 Karıştır</button>
        <button class="smbtn" id="wkbtn" onclick="toggleWeak()">🔴 Zayıflarım</button>
      </div>
      <div id="wkpanel" style="display:none;width:100%;max-width:480px">
        <div class="wkp"><div class="wkt">🔴 Zayıf Mod</div><div class="wks" id="wksub"></div><div class="wtags" id="wktags"></div></div>
      </div>
      <div class="scene" id="scene" onclick="flipCard()">
        <div class="inner" id="inner">
          <div class="face fr" id="front">
            <div class="cbadge" id="cbadge" style="display:none"></div>
            <div class="clbl" id="flbl">İngilizce</div>
            <div class="cword" id="fword">—</div>
            <div class="exw" id="exw">
              <div class="exen" id="exen"></div>
              <div class="extr" id="extr"></div>
            </div>
            <div class="chint">Tıklayarak çeviriyi gör</div>
          </div>
          <div class="face bk">
            <div class="clbl" id="blbl">Türkçe</div>
            <div class="cword" id="bword">—</div>
          </div>
        </div>
      </div>
      <div class="cnav" id="fcnav">
        <button class="nbtn" onclick="prevCard()">← Önceki</button>
        <span class="ninfo" id="fcinfo">— / —</span>
        <button class="nbtn" onclick="nextCard()">Sonraki →</button>
      </div>
      <div class="mrow" id="fcmarks">
        <button class="mbtn no" onclick="mark(false)">✗ Bilmedim</button>
        <button class="mbtn yes" onclick="mark(true)">✓ Bildim</button>
      </div>
      <div class="empty" id="fcempty" style="display:none">
        <div class="ei" id="fcei">📚</div><div id="fcem">Kelime yok.</div>
      </div>
    </div>
  </div>
  <div class="sc" id="sc-qz">
    <div class="qw">
      <div class="pb"><div class="pbf" id="qzpb"></div></div>
      <div id="qzarea">
        <div class="qbox">
          <div class="qlbl" id="qlbl">Türkçesi nedir?</div>
          <div class="qword" id="qword">—</div>
          <div class="qsent" id="qsent"></div>
        </div>
        <div style="height:9px"></div>
        <div class="qopts" id="qopts"></div>
      </div>
      <div class="sbox" id="qzscore" style="display:none">
        <div class="semoji" id="semoji">🎉</div>
        <div class="snum" id="snum">0/0</div>
        <div class="slbl">doğru cevap</div>
        <div class="brow">
          <button class="pbtn" onclick="startQuiz(false)">Tüm Kelimeler</button>
          <button class="obtn" onclick="startQuiz(true)">🔴 Sadece Zayıflarım</button>
        </div>
      </div>
      <div class="empty" id="qzempty" style="display:none">
        <div class="ei">🧩</div><div id="qzemmsg">En az 4 kelime gerekli.</div>
      </div>
    </div>
  </div>
  <div class="sc" id="sc-add">
    <div class="aform">
      <div class="frow">
        <div><label class="flbl">İngilizce</label><input class="fi" id="iEn" placeholder="apple" type="text"></div>
        <div><label class="flbl">Türkçe</label><input class="fi" id="iTr" placeholder="elma" type="text"></div>
      </div>
      <button class="abtn" onclick="addWord()">+ Kelime Ekle</button>
    </div>
    <div class="lhdr">
      <div class="ltitle">Kelime Listesi</div>
      <input class="srch" id="srch" placeholder="🔍 Ara..." type="text" oninput="renderList()">
    </div>
    <div class="wlist" id="wlist"></div>
    <div class="empty" id="addempty" style="display:none"><div class="ei">🔍</div>Bulunamadı.</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>

  try{var r=localStorage.getItem(SK);if(r){var d=JSON.parse(r);prog=d.prog||{};}}catch(e){prog={};}
}

function saveData(){
  setSS('s');clearTimeout(saveT);
  saveT=setTimeout(function(){
    try{localStorage.setItem(SK,JSON.stringify({prog:prog}));setSS('ok');}
    catch(e){setSS('e');}
  },800);
}

function setSS(s){
  var d=g('dot'),l=g('synclbl');
  d.className='dot'+(s==='s'?' s':s==='e'?' e':'');
  l.textContent=s==='s'?'Kaydediliyor...':s==='e'?'Hata':'Kaydedildi ✓';
}

function sfl(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function toast(msg,c){
  var t=g('toast');t.textContent=msg;t.className='toast show '+(c||'tg');
  clearTimeout(t._t);t._t=setTimeout(function(){t.className='toast';},2000);
}

function kn(){return words.filter(function(w){return prog[w.en]===true;});}
function wk(){return words.filter(function(w){return prog[w.en]===false;});}

function hlW(s,w){
  return s.replace(new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="exhl">$1</span>');
}

function updStats(){
  var k=kn().length,wkl=wk().length,tot=words.length;
  g('stot').textContent=tot;g('skn').textContent=k;g('swk').textContent=wkl;
  g('cntbadge').textContent=tot+' kelime';
  g('ring').style.strokeDashoffset=113*(1-(tot>0?k/tot:0));
}

function goTab(name){
  ['fc','qz','add'].forEach(function(n){
    g('sc-'+n).className='sc'+(n===name?' on':'');
    g('tab-'+n).className='tb'+(n===name?' on':'');
  });
  if(name==='qz')startQuiz(false);
  if(name==='add')renderList();
}

function setDir(d){
  fcDir=d;
  g('dEN').className='db'+(d==='EN'?' on':'');
  g('dTR').className='db'+(d==='TR'?' on':'');
  idx=0;setFlip(false);renderFC();
}

function doShuffle(){pool=sfl(pool);idx=0;setFlip(false);renderFC();}

function toggleWeak(){
  var w=wk();
  if(!wkMode&&w.length===0){toast('"Bilmedim" dediğin kelime yok!','tr');return;}
  wkMode=!wkMode;
  pool=sfl(wkMode?wk():words.slice());
  idx=0;setFlip(false);
  g('wkbtn').className='smbtn'+(wkMode?' ron':'');
  g('wkbtn').textContent=wkMode?'✓ Zayıf Mod':'🔴 Zayıflarım';
  updWkPanel();renderFC();
}

function updWkPanel(){
  var panel=g('wkpanel'),w=wk();
  if(!wkMode||w.length===0){panel.style.display='none';return;}
  panel.style.display='block';
  g('wksub').textContent=pool.length+' kelime gösteriliyor';
  var t=pool.slice(0,6).map(function(x){return'<span class="wtag">'+x.en+'</span>';}).join('');
  if(pool.length>6)t+='<span class="wtag">+'+(pool.length-6)+'</span>';
  g('wktags').innerHTML=t;
}

function setFlip(v){
  flipped=v;
  g('inner').className='inner'+(v?' flip':'');
}

function renderFC(){
  var sc=g('scene'),nav=g('fcnav'),marks=g('fcmarks'),emp=g('fcempty');
  if(pool.length===0){
    sc.style.display='none';nav.style.display='none';marks.style.display='none';emp.style.display='block';
    g('fcei').textContent=wkMode?'🎉':'📚';
    g('fcem').textContent=wkMode?'Tüm zayıf kelimeler tamamlandı! 🎉':'Kelime yok.';
    return;
  }
  sc.style.display='';nav.style.display='';marks.style.display='';emp.style.display='none';
  if(idx>=pool.length)idx=0;
  var w=pool[idx],st=prog[w.en];
  var fr=g('front'),badge=g('cbadge');
  fr.className='face fr'+(st===true?' gg':st===false?' gr':'');
  if(st===true){badge.style.display='';badge.className='cbadge kg';badge.textContent='✓ Biliniyor';}
  else if(st===false){badge.style.display='';badge.className='cbadge kr';badge.textContent='✗ Zayıf';}
  else{badge.style.display='none';}
  g('flbl').textContent=fcDir==='EN'?'İngilizce':'Türkçe';
  g('fword').textContent=fcDir==='EN'?w.en:w.tr;
  g('blbl').textContent=fcDir==='EN'?'Türkçe':'İngilizce';
  g('bword').textContent=fcDir==='EN'?w.tr:w.en;
  g('fcinfo').textContent=(idx+1)+' / '+pool.length;
  g('fcpb').style.width=((idx+1)/pool.length*100)+'%';
  var exw=g('exw'),exen=g('exen'),extr=g('extr');
  if(fcDir==='EN'&&SENTENCES[w.en]){
    exw.style.display='';
    exen.innerHTML=hlW(SENTENCES[w.en].en,w.en);
    extr.textContent=SENTENCES[w.en].tr;
  }else{exw.style.display='none';exen.innerHTML='';extr.textContent='';}
}

function flipCard(){if(!busy)setFlip(!flipped);}
function nextCard(){idx=(idx+1)%pool.length;setFlip(false);renderFC();}
function prevCard(){idx=(idx-1+pool.length)%pool.length;setFlip(false);renderFC();}

function mark(known){
  if(pool.length===0||busy)return;
  var w=pool[idx],prev=prog[w.en];
  prog[w.en]=known;
  if(wkMode&&known){
    pool.splice(idx,1);
    if(pool.length===0){updStats();saveData();renderFC();return;}
    idx=idx%pool.length;
    toast('✓ "'+w.en+'" öğrenildi! 🎉','tg');
  }else{
    if(!known&&prev!==false)toast('✗ "'+w.en+'" zayıf listene eklendi','tr');
    else if(known&&prev!==true)toast('✓ "'+w.en+'" öğrenildi!','tg');
    idx=(idx+1)%pool.length;
  }
  updStats();updWkPanel();saveData();
  busy=true;
  var sc=g('scene');
  sc.style.cssText='transition:transform .22s ease,opacity .22s ease;transform:translateX('+(known?'70px':'−70px')+') rotate('+(known?'3':'−3')+'deg);opacity:0';
  setTimeout(function(){
    sc.style.cssText='transition:none;transform:translateX('+(known?'−30px':'30px')+');opacity:0';
    setFlip(false);renderFC();
    setTimeout(function(){
      sc.style.cssText='transition:transform .22s ease,opacity .22s ease;transform:translateX(0);opacity:1';
      setTimeout(function(){busy=false;sc.style.cssText='';},240);
    },16);
  },230);
}

function startQuiz(onlyWeak){
  var p=onlyWeak?wk():words;
  g('qzscore').style.display='none';g('qzempty').style.display='none';g('qzarea').style.display='';
  if(p.length<4){
    g('qzarea').style.display='none';g('qzempty').style.display='block';
    g('qzemmsg').textContent=onlyWeak?'Zayıf listende en az 4 kelime olmalı!':'En az 4 kelime gerekli.';return;
  }
  qpool=sfl(p);qidx=0;qscore=0;qdone=false;qanswered=false;renderQuiz();
}

function renderQuiz(){
  if(qidx>=qpool.length){
    g('qzarea').style.display='none';g('qzscore').style.display='block';
    var p=qscore/qpool.length;
    g('snum').textContent=qscore+'/'+qpool.length;
    g('semoji').textContent=p>=.8?'🎉':p>=.5?'👍':'📖';return;
  }
  qanswered=false;
  var w=qpool[qidx],showEN=Math.random()>.5;
  g('qlbl').textContent=showEN?'Bu kelimenin Türkçesi nedir?':'Bu kelimenin İngilizcesi nedir?';
  g('qword').textContent=showEN?w.en:w.tr;
  g('qzpb').style.width=(qidx/qpool.length*100)+'%';
  var qs=g('qsent');qs.innerHTML='';
  if(showEN&&SENTENCES[w.en])qs.innerHTML=hlW(SENTENCES[w.en].en,w.en);
  var correct=showEN?w.tr:w.en;
  var wrong=sfl(words.filter(function(x){return x.en!==w.en;})).slice(0,3).map(function(x){return showEN?x.tr:x.en;});
  var opts=sfl([correct].concat(wrong));
  var c=g('qopts');c.innerHTML='';
  opts.forEach(function(o){
    var b=document.createElement('button');
    b.className='qopt';b.textContent=o;
    b.onclick=function(){answerQ(b,o===correct,correct,w,showEN);};
    c.appendChild(b);
  });
}

function answerQ(btn,ok,correct,w,wasEN){
  if(qanswered)return;qanswered=true;
  if(wasEN){prog[w.en]=ok;saveData();updStats();}
  if(ok){btn.className='qopt ok';qscore++;}
  else{
    btn.className='qopt no';
    var bs=document.querySelectorAll('.qopt');
    for(var i=0;i<bs.length;i++){if(bs[i].textContent===correct)bs[i].className='qopt ok';}
  }
  var all=document.querySelectorAll('.qopt');
  for(var i=0;i<all.length;i++)all[i].disabled=true;
  setTimeout(function(){qidx++;renderQuiz();},1300);
}

g('iEn').addEventListener('keydown',function(e){if(e.keyCode===13)addWord();});
g('iTr').addEventListener('keydown',function(e){if(e.keyCode===13)addWord();});

function addWord(){
  var en=g('iEn').value.replace(/^\s+|\s+$/g,'').toLowerCase();
  var tr=g('iTr').value.replace(/^\s+|\s+$/g,'').toLowerCase();
  if(!en||!tr)return;
  var exists=false;
  for(var i=0;i<words.length;i++){if(words[i].en===en){exists=true;break;}}
  if(exists){
    var inp=g('iEn');inp.className='fi err';
    setTimeout(function(){inp.className='fi';},1000);return;
  }
  words.push({en:en,tr:tr});
  if(!wkMode)pool=words.slice();
  g('iEn').value='';g('iTr').value='';g('iEn').focus();
  renderList();updStats();
}

function delWord(en){
  var nw=[];for(var i=0;i<words.length;i++){if(words[i].en!==en)nw.push(words[i]);}words=nw;
  delete prog[en];
  var np=[];for(var i=0;i<pool.length;i++){if(pool[i].en!==en)np.push(pool[i]);}pool=np;
  if(idx>=pool.length)idx=Math.max(0,pool.length-1);
  saveData();renderList();updStats();
}

function renderList(){
  var q=(g('srch').value||'').toLowerCase();
  var f=q?words.filter(function(w){return w.en.indexOf(q)>-1||w.tr.indexOf(q)>-1;}):words;
  var list=g('wlist'),emp=g('addempty');
  list.innerHTML='';
  if(f.length===0){emp.style.display='block';return;}
  emp.style.display='none';
  for(var i=0;i<f.length;i++){
    var w=f[i],st=prog[w.en];
    var cls='wi'+(st===true?' gk':st===false?' rk':'');
    var badge=st===true?'<span class="wb g">✓</span>':st===false?'<span class="wb r">✗</span>':'';
    var div=document.createElement('div');div.className=cls;
    div.innerHTML='<div class="wit"><span class="wen">'+w.en+'</span><span class="wsep"> — </span><span class="wtr">'+w.tr+'</span>'+badge+'</div><button class="delbtn" onclick="delWord(\''+w.en.replace(/'/g,"\\'")+'\')\">✕</button>';
    list.appendChild(div);
  }
}

// INIT
loadData();
pool=sfl(words.slice());
updStats();
renderFC();
</script>
</body>
</html>
